<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dedicare Solutions &#8212; Assistenza Sanitaria Personalizzata</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--white:#FFFFFF;--off-white:#F7F9FC;--cream:#FFF9F0;--blue:#0B5FA5;--blue-dark:#07447C;--blue-light:#E8F1FB;--blue-soft:#F0F6FC;--teal:#15A89A;--teal-light:#E1F5F3;--coral:#E86A4C;--coral-light:#FCEEE9;--amber:#F4A442;--amber-light:#FEF3E2;--black:#1A2332;--gray:#5A6778;--gray-light:#8B96A5;--border-light:#E5EAF0;--border:#D4DCE6;}
html{scroll-behavior:smooth;}
body{font-family:'Georgia',serif;background:var(--white);color:var(--black);line-height:1.7;overflow-x:hidden;}
.reveal{opacity:0;transform:translateY(32px);transition:opacity .75s ease,transform .75s ease;}.reveal.on{opacity:1;transform:none;}
.reveal-l{opacity:0;transform:translateX(-40px);transition:opacity .8s ease,transform .8s ease;}.reveal-l.on{opacity:1;transform:none;}
.reveal-r{opacity:0;transform:translateX(40px);transition:opacity .8s ease,transform .8s ease;}.reveal-r.on{opacity:1;transform:none;}
.d1{transition-delay:.1s;}.d2{transition-delay:.2s;}.d3{transition-delay:.3s;}.d4{transition-delay:.4s;}.d5{transition-delay:.5s;}
nav{position:sticky;top:0;z-index:200;background:var(--white);border-bottom:1px solid var(--border-light);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:74px;transition:box-shadow .3s;}
nav.shadow{box-shadow:0 4px 24px rgba(11,95,165,.08);}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-circle{width:46px;height:46px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(11,95,165,.15);border:2px solid var(--blue);transition:transform .3s;flex-shrink:0;}
.nav-logo:hover .logo-circle{transform:scale(1.05) rotate(-5deg);}
.nav-brand{font-size:22px;color:var(--black);letter-spacing:.02em;}
.nav-brand b{color:var(--blue);font-weight:400;font-style:italic;}
.nav-links{display:flex;gap:0;list-style:none;}
.nav-links a{padding:0 18px;font-family:sans-serif;font-size:13px;color:var(--gray);text-decoration:none;letter-spacing:.05em;text-transform:uppercase;height:74px;display:flex;align-items:center;border-bottom:3px solid transparent;transition:color .2s,border-color .2s;font-weight:500;}
.nav-links a:hover{color:var(--blue);border-color:var(--blue);}
.nav-actions{display:flex;gap:10px;align-items:center;}
.btn-nav-ghost{font-family:sans-serif;font-size:12px;color:var(--blue);border:1.5px solid var(--blue);padding:8px 18px;border-radius:3px;text-decoration:none;transition:all .2s;letter-spacing:.04em;text-transform:uppercase;font-weight:500;min-height:44px;display:flex;align-items:center;}
.btn-nav-ghost:hover{background:var(--blue);color:#fff;}
.btn-nav-solid{font-family:sans-serif;font-size:12px;background:var(--blue);color:#fff;padding:9px 20px;border-radius:3px;text-decoration:none;transition:all .2s;letter-spacing:.04em;text-transform:uppercase;font-weight:500;box-shadow:0 2px 8px rgba(11,95,165,.25);min-height:44px;display:flex;align-items:center;}
.btn-nav-solid:hover{background:var(--blue-dark);transform:translateY(-1px);}
.mobile-menu-btn{display:none;background:none;border:1.5px solid var(--border);width:44px;height:44px;align-items:center;justify-content:center;border-radius:3px;cursor:pointer;padding:0;flex-shrink:0;}
.mobile-menu-btn span{display:block;width:20px;height:2px;background:var(--black);position:relative;transition:.3s;}
.mobile-menu-btn span::before,.mobile-menu-btn span::after{content:'';position:absolute;left:0;width:20px;height:2px;background:var(--black);transition:.3s;}
.mobile-menu-btn span::before{top:-6px;}.mobile-menu-btn span::after{top:6px;}
.mobile-menu-btn.active span{background:transparent;}
.mobile-menu-btn.active span::before{top:0;transform:rotate(45deg);}
.mobile-menu-btn.active span::after{top:0;transform:rotate(-45deg);}
.hero{background:linear-gradient(135deg,var(--blue-soft) 0%,var(--cream) 100%);padding:90px 5% 80px;display:flex;flex-direction:column;align-items:flex-start;border-bottom:1px solid var(--border-light);position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-120px;top:-120px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(11,95,165,.08) 0%,transparent 70%);z-index:0;}
.hero::after{content:'';position:absolute;left:-80px;bottom:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(244,164,66,.1) 0%,transparent 70%);z-index:0;}
.hero-content{position:relative;z-index:1;width:100%;}
.hero-logo-big{width:90px;height:90px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 10px 30px rgba(11,95,165,.2);border:3px solid var(--blue);position:relative;}
.hero-logo-big::after{content:'';position:absolute;inset:-10px;border-radius:50%;border:1px dashed rgba(11,95,165,.25);animation:spin 20s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.hero-logo-big svg{width:58px;height:58px;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--blue-light);padding:7px 16px;border-radius:20px;font-family:sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:24px;font-weight:600;box-shadow:0 2px 8px rgba(11,95,165,.06);}
.hero-badge::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 3px rgba(21,168,154,.2);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(21,168,154,.2);}50%{box-shadow:0 0 0 6px rgba(21,168,154,.05);}}
.hero h1{font-size:clamp(1.9rem,4.2vw,3.4rem);font-weight:400;line-height:1.15;color:var(--black);margin-bottom:22px;}
.hero h1 em{color:var(--blue);font-style:italic;}
.hero-sub{font-family:sans-serif;font-size:15px;color:var(--gray);line-height:1.8;margin-bottom:36px;max-width:520px;}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;}
.btn-primary{background:var(--blue);color:#fff;padding:15px 30px;font-family:sans-serif;font-size:13px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;border-radius:4px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;font-weight:600;box-shadow:0 4px 14px rgba(11,95,165,.25);min-height:52px;}
.btn-primary:hover{background:var(--blue-dark);transform:translateY(-2px);}
.btn-outline{border:1.5px solid var(--blue);color:var(--blue);padding:14px 30px;font-family:sans-serif;font-size:13px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;border-radius:4px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;font-weight:600;background:#fff;min-height:52px;}
.btn-outline:hover{background:var(--blue);color:#fff;transform:translateY(-2px);}
.btn-coral{background:var(--coral);color:#fff;padding:15px 30px;font-family:sans-serif;font-size:13px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;border-radius:4px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;font-weight:600;min-height:52px;}
.btn-coral:hover{background:#D85A3C;transform:translateY(-2px);}
.stats-bar{background:#fff;border-bottom:1px solid var(--border-light);padding:0 5%;display:grid;grid-template-columns:repeat(4,1fr);}
.stat-item{padding:32px 20px;border-right:1px solid var(--border-light);text-align:center;transition:background .25s;position:relative;}
.stat-item:last-child{border-right:none;}.stat-item:hover{background:var(--blue-soft);}
.stat-item::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue);transform:scaleX(0);transition:transform .3s;}
.stat-item:hover::before{transform:scaleX(1);}
.stat-num{font-size:2.2rem;color:var(--blue);line-height:1;margin-bottom:6px;}
.stat-label{font-family:sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);font-weight:500;}
.quick-links{background:var(--blue-soft);padding:18px 5%;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border-light);}
.quick-link{background:#fff;border:1px solid var(--border-light);padding:12px 20px;border-radius:22px;font-family:sans-serif;font-size:13px;color:var(--black);text-decoration:none;display:flex;align-items:center;gap:8px;transition:all .2s;font-weight:500;min-height:44px;}
.quick-link:hover{background:var(--blue);color:#fff;border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 16px rgba(11,95,165,.2);}
.quick-link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0;}
section{padding:88px 5%;}
.sec-eyebrow{font-family:sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:12px;font-weight:600;}
.sec-title{font-size:clamp(1.6rem,3vw,2.7rem);font-weight:400;line-height:1.2;color:var(--black);margin-bottom:12px;}
.sec-title em{font-style:italic;color:var(--blue);}
.sec-rule{width:48px;height:3px;background:var(--blue);margin-bottom:36px;border-radius:2px;}
#servizi{background:#fff;}
.services-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:12px;}
.svc{background:#fff;padding:36px 28px;position:relative;overflow:hidden;transition:all .3s;border:1px solid var(--border-light);border-radius:12px;}
.svc:hover{box-shadow:0 12px 32px rgba(11,95,165,.1);transform:translateY(-4px);border-color:var(--blue-light);}
.svc-top-bar{position:absolute;top:0;left:0;right:0;height:4px;transform:scaleX(0);transition:transform .4s;transform-origin:left;border-radius:12px 12px 0 0;}
.svc:nth-child(1) .svc-top-bar{background:var(--blue);}.svc:nth-child(2) .svc-top-bar{background:var(--teal);}
.svc:nth-child(3) .svc-top-bar{background:var(--coral);}.svc:nth-child(4) .svc-top-bar{background:var(--amber);}
.svc:hover .svc-top-bar{transform:scaleX(1);}
.svc-num{font-family:sans-serif;font-size:11px;letter-spacing:.15em;margin-bottom:18px;font-weight:600;}
.svc:nth-child(1) .svc-num{color:var(--blue);}.svc:nth-child(2) .svc-num{color:var(--teal);}
.svc:nth-child(3) .svc-num{color:var(--coral);}.svc:nth-child(4) .svc-num{color:var(--amber);}
.svc-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;transition:transform .3s;}
.svc:hover .svc-icon{transform:scale(1.08) rotate(-3deg);}
.svc:nth-child(1) .svc-icon{background:var(--blue-light);}.svc:nth-child(2) .svc-icon{background:var(--teal-light);}
.svc:nth-child(3) .svc-icon{background:var(--coral-light);}.svc:nth-child(4) .svc-icon{background:var(--amber-light);}
.svc h3{font-size:18px;font-weight:400;margin-bottom:10px;}
.svc p{font-family:sans-serif;font-size:13px;color:var(--gray);line-height:1.75;margin-bottom:16px;}
.svc-list{list-style:none;display:flex;flex-direction:column;gap:8px;padding-top:16px;border-top:1px solid var(--border-light);}
.svc-list li{font-family:sans-serif;font-size:12px;color:var(--gray);padding-left:18px;position:relative;line-height:1.5;}
.svc-list li::before{content:'\2713';position:absolute;left:0;font-size:11px;font-weight:700;}
.svc:nth-child(1) .svc-list li::before{color:var(--blue);}.svc:nth-child(2) .svc-list li::before{color:var(--teal);}
.svc:nth-child(3) .svc-list li::before{color:var(--coral);}.svc:nth-child(4) .svc-list li::before{color:var(--amber);}
.manifesto{background:linear-gradient(135deg,var(--black) 0%,#15233A 100%);padding:88px 5%;position:relative;overflow:hidden;}
.manifesto::before{content:'';position:absolute;right:-150px;top:-150px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(11,95,165,.15) 0%,transparent 70%);}
.manifesto .sec-eyebrow{color:var(--amber);}.manifesto .sec-title{color:#fff;}.manifesto .sec-title em{color:var(--amber);}.manifesto .sec-rule{background:var(--amber);}
.manifesto-grid{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:start;margin-top:12px;position:relative;z-index:1;}
.manifesto-text p{font-family:sans-serif;font-size:15px;color:#B8C4D2;line-height:1.9;margin-bottom:20px;}
.manifesto-text strong{color:#fff;font-weight:500;}
.pillars{display:flex;flex-direction:column;gap:12px;}
.pillar{background:rgba(255,255,255,.04);padding:20px 24px;border-left:3px solid transparent;transition:all .25s;border-radius:0 8px 8px 0;}
.pillar:nth-child(1):hover{border-color:var(--blue);background:rgba(11,95,165,.1);}
.pillar:nth-child(2):hover{border-color:var(--teal);background:rgba(21,168,154,.1);}
.pillar:nth-child(3):hover{border-color:var(--amber);background:rgba(244,164,66,.1);}
.pillar:nth-child(4):hover{border-color:var(--coral);background:rgba(232,106,76,.1);}
.pillar h4{font-size:15px;color:#fff;margin-bottom:6px;font-weight:500;font-family:sans-serif;}
.pillar p{font-family:sans-serif;font-size:13px;color:#8B96A5;line-height:1.65;}
.vitals{background:var(--off-white);padding:88px 5%;}
.vitals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:12px;}
.vital{background:#fff;border:1px solid var(--border-light);border-radius:14px;padding:36px 28px;transition:all .3s;position:relative;overflow:hidden;}
.vital:hover{box-shadow:0 12px 36px rgba(11,95,165,.1);transform:translateY(-5px);}
.vital::before{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;transform:scaleX(0);transition:transform .4s;transform-origin:left;}
.vital:nth-child(1)::before{background:var(--coral);}.vital:nth-child(2)::before{background:var(--teal);}.vital:nth-child(3)::before{background:var(--amber);}
.vital:hover::before{transform:scaleX(1);}
.vital-icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:20px;}
.vital:nth-child(1) .vital-icon{background:var(--coral-light);}.vital:nth-child(2) .vital-icon{background:var(--teal-light);}.vital:nth-child(3) .vital-icon{background:var(--amber-light);}
.vital h3{font-size:18px;font-weight:400;margin-bottom:10px;}
.vital p{font-family:sans-serif;font-size:13px;color:var(--gray);line-height:1.75;}
.vital-tag{display:inline-block;margin-top:16px;padding:5px 14px;font-family:sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;border-radius:20px;font-weight:600;}
.vital:nth-child(1) .vital-tag{background:var(--coral-light);color:var(--coral);}
.vital:nth-child(2) .vital-tag{background:var(--teal-light);color:var(--teal);}
.vital:nth-child(3) .vital-tag{background:var(--amber-light);color:#C97D10;}
.process{background:#fff;padding:88px 5%;}
.process-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:12px;position:relative;}
.process-grid::before{content:'';position:absolute;top:40px;left:12.5%;right:12.5%;height:2px;background:linear-gradient(to right,var(--blue),var(--teal),var(--amber),var(--coral));z-index:0;opacity:.3;}
.step{background:#fff;padding:28px 20px;text-align:center;transition:all .3s;border-radius:12px;position:relative;z-index:1;border:1px solid var(--border-light);}
.step:hover{box-shadow:0 8px 24px rgba(11,95,165,.1);transform:translateY(-4px);}
.step-circle{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:sans-serif;font-size:18px;font-weight:500;color:#fff;transition:transform .3s;}
.step:nth-child(1) .step-circle{background:var(--blue);}.step:nth-child(2) .step-circle{background:var(--teal);}
.step:nth-child(3) .step-circle{background:var(--amber);}.step:nth-child(4) .step-circle{background:var(--coral);}
.step:hover .step-circle{transform:scale(1.12);}
.step h4{font-size:15px;font-weight:500;margin-bottom:8px;font-family:sans-serif;}
.step p{font-family:sans-serif;font-size:12px;color:var(--gray);line-height:1.65;}
.pazienti{background:var(--blue-soft);padding:88px 5%;}
.pazienti-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:12px;}
.paziente{background:#fff;border:1px solid var(--border-light);border-radius:12px;padding:28px 24px;display:flex;gap:18px;align-items:flex-start;transition:all .3s;}
.paziente:hover{box-shadow:0 10px 28px rgba(11,95,165,.1);transform:translateY(-3px);}
.paz-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.paziente:nth-child(1) .paz-icon{background:var(--blue-light);}.paziente:nth-child(2) .paz-icon{background:var(--teal-light);}
.paziente:nth-child(3) .paz-icon{background:var(--coral-light);}.paziente:nth-child(4) .paz-icon{background:var(--amber-light);}
.paziente h3{font-size:17px;font-weight:400;margin-bottom:8px;}
.paziente p{font-family:sans-serif;font-size:13px;color:var(--gray);line-height:1.75;}
.valori{background:#fff;padding:88px 5%;}
.valori-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:12px;}
.valore{background:var(--off-white);padding:28px 24px;transition:all .3s;border-radius:10px;border:1px solid var(--border-light);}
.valore:hover{background:#fff;box-shadow:0 10px 28px rgba(11,95,165,.08);transform:translateY(-3px);border-color:var(--blue-light);}
.valore-n{font-family:sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:12px;font-weight:600;}
.valore h3{font-size:16px;font-weight:400;margin-bottom:8px;}
.valore p{font-family:sans-serif;font-size:13px;color:var(--gray);line-height:1.7;}
.quote{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-dark) 100%);padding:72px 5%;text-align:center;position:relative;overflow:hidden;}
.quote::before{content:'"';position:absolute;top:-40px;left:50%;transform:translateX(-50%);font-size:280px;color:rgba(255,255,255,.06);font-family:Georgia,serif;line-height:1;pointer-events:none;}
.quote blockquote{font-size:clamp(1.05rem,2.6vw,1.7rem);color:#fff;font-style:italic;max-width:820px;margin:0 auto 18px;line-height:1.7;position:relative;z-index:1;}
.quote cite{font-family:sans-serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#B8D4EB;position:relative;z-index:1;}
.why{background:var(--off-white);padding:88px 5%;}
.why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:12px;}
.why-item{background:#fff;padding:28px 24px;transition:all .3s;border-radius:12px;border:1px solid var(--border-light);}
.why-item:hover{box-shadow:0 10px 28px rgba(11,95,165,.1);transform:translateY(-3px);}
.check{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.why-item:nth-child(3n+1) .check{background:var(--blue);}.why-item:nth-child(3n+2) .check{background:var(--teal);}.why-item:nth-child(3n+3) .check{background:var(--coral);}
.why-item h4{font-size:15px;font-weight:500;margin-bottom:8px;font-family:sans-serif;}
.why-item p{font-family:sans-serif;font-size:13px;color:var(--gray);line-height:1.65;}
.team{background:linear-gradient(135deg,var(--blue-soft) 0%,var(--cream) 100%);padding:88px 5%;}
.team-card{background:#fff;border:1px solid var(--border-light);border-radius:16px;padding:44px 40px;display:flex;gap:36px;align-items:flex-start;max-width:780px;margin-top:12px;box-shadow:0 10px 40px rgba(11,95,165,.08);}
.team-avatar{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--blue) 0%,var(--teal) 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-family:sans-serif;font-size:24px;font-weight:500;flex-shrink:0;box-shadow:0 8px 24px rgba(11,95,165,.3);}
.team-name{font-size:22px;font-weight:400;margin-bottom:6px;}
.team-role{font-family:sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:16px;font-weight:600;}
.team-bio{font-family:sans-serif;font-size:14px;color:var(--gray);line-height:1.85;}
.contatti{background:#fff;padding:88px 5%;border-top:1px solid var(--border-light);}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;margin-top:12px;}
.contact-infos{display:flex;flex-direction:column;gap:12px;}
.cinfo{background:var(--off-white);border:1px solid var(--border-light);padding:20px 22px;display:flex;gap:14px;align-items:center;transition:all .2s;border-radius:10px;min-height:72px;}
.cinfo:hover{background:#fff;border-color:var(--blue);box-shadow:0 6px 20px rgba(11,95,165,.08);}
.cinfo-ic{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cinfo:nth-child(1) .cinfo-ic{background:var(--blue-light);}.cinfo:nth-child(2) .cinfo-ic{background:var(--teal-light);}
.cinfo:nth-child(3) .cinfo-ic{background:var(--coral-light);}.cinfo:nth-child(4) .cinfo-ic{background:var(--amber-light);}
.cinfo-ic svg{width:18px;height:18px;fill:none;stroke-width:1.7;}
.cinfo:nth-child(1) .cinfo-ic svg{stroke:var(--blue);}.cinfo:nth-child(2) .cinfo-ic svg{stroke:var(--teal);}
.cinfo:nth-child(3) .cinfo-ic svg{stroke:var(--coral);}.cinfo:nth-child(4) .cinfo-ic svg{stroke:#C97D10;}
.cinfo-label{font-family:sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gray-light);margin-bottom:3px;font-weight:600;}

.form-row input:focus,.form-row textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(11,95,165,.12);}
.form-row textarea{min-height:110px;resize:vertical;}
.form-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}

.fbtn-dark{background:var(--blue);color:#fff;box-shadow:0 3px 10px rgba(11,95,165,.25);}
